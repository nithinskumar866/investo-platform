version: "3.9"

services:
  postgres:
    image: postgres:16-alpine
    container_name: investo-postgres
    restart: unless-stopped
    volumes:
      - postgres_data:/var/lib/postgresql/data
    environment:
      POSTGRES_DB: investo
      POSTGRES_USER: investo
      POSTGRES_PASSWORD: investo
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U investo"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: investo-redis
    restart: unless-stopped
    command: redis-server --requirepass redispass
    volumes:
      - redis_data:/data
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "redispass", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  minio:
    image: minio/minio:latest
    container_name: investo-minio
    restart: unless-stopped
    command: server /data --console-address ":9001"
    volumes:
      - minio_data:/data
    ports:
      - "9000:9000"
      - "9001:9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
      MINIO_DOMAIN: localhost

  createbuckets:
    image: minio/mc:latest
    depends_on:
      - minio
    entrypoint: >
      /bin/sh -c "
      /usr/bin/mc config host add myminio http://minio:9000 minioadmin minioadmin;
      /usr/bin/mc mb myminio/investo-media --ignore-existing;
      /usr/bin/mc policy set public myminio/investo-media;
      exit 0;
      "

  django:
    build:
      context: ..
      dockerfile: docker/Dockerfile.django
    container_name: investo-django
    restart: unless-stopped
    command: >
      sh -c "
      python manage.py migrate --noinput &&
      gunicorn config.wsgi:application --bind 0.0.0.0:8000 --workers 4 --threads 2 --worker-class gthread
      "
    volumes:
      - static_volume:/app/staticfiles
      - media_volume:/app/media
    ports:
      - "8000:8000"
    env_file:
      - ../.env
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  channels:
    build:
      context: ..
      dockerfile: docker/Dockerfile.django
    container_name: investo-channels
    restart: unless-stopped
    command: daphne -b 0.0.0.0 -p 8001 config.asgi:application
    volumes:
      - media_volume:/app/media
    ports:
      - "8001:8001"
    env_file:
      - ../.env
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  celery-worker:
    build:
      context: ..
      dockerfile: docker/Dockerfile.celery
    container_name: investo-celery-worker
    restart: unless-stopped
    command: celery -A config worker -l info -c 4
    volumes:
      - media_volume:/app/media
    env_file:
      - ../.env
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  celery-beat:
    build:
      context: ..
      dockerfile: docker/Dockerfile.celery-beat
    container_name: investo-celery-beat
    restart: unless-stopped
    command: celery -A config beat -l info
    env_file:
      - ../.env
    depends_on:
      redis:
        condition: service_healthy

  nginx:
    build:
      context: ..
      dockerfile: docker/Dockerfile.nginx
    container_name: investo-nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - static_volume:/app/staticfiles
      - media_volume:/app/media
    depends_on:
      - django
      - channels

volumes:
  postgres_data:
  redis_data:
  minio_data:
  static_volume:
  media_volume:
