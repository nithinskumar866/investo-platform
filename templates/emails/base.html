<!DOCTYPE html>
<html>
<head><meta charset="utf-8"></head>
<body style="font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: #f5f5f5; margin: 0; padding: 0;">
  <table width="100%" cellpadding="0" cellspacing="0"><tr><td align="center" style="padding: 40px 0;">
    <table width="600" cellpadding="0" cellspacing="0" style="background: #ffffff; border-radius: 8px; overflow: hidden; box-shadow: 0 2px 8px rgba(0,0,0,0.1);">
      <tr><td style="padding: 32px 40px; background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);">
        <h1 style="color: #ffffff; margin: 0; font-size: 24px;">{% block header %}{{ title }}{% endblock %}</h1>
      </td></tr>
      <tr><td style="padding: 32px 40px; color: #333; line-height: 1.6;">
        {% block content %}{{ message }}{% endblock %}
      </td></tr>
      <tr><td style="padding: 24px 40px; border-top: 1px solid #eee; color: #999; font-size: 12px; text-align: center;">
        <p>&copy; {% now "Y" %} Investo. All rights reserved.</p>
        <p>If you have any questions, contact us at <a href="mailto:support@investo.com" style="color: #667eea;">support@investo.com</a></p>
      </td></tr>
    </table>
  </td></tr></table>
</body>
</html>
