openapi: 3.0.3
info:
  title: Investo API
  version: 2.0.0
  description: Startup Ecosystem Platform API - Connect entrepreneurs, investors,
    mentors, and talent.
paths:
  /api/v1/auth/forgot-password/:
    post:
      operationId: auth_forgot_password_create
      summary: Request password reset OTP
      tags:
      - Authentication
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PasswordResetRequestRequest'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/PasswordResetRequestRequest'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/PasswordResetRequestRequest'
        required: true
      security:
      - jwtAuth: []
      - BearerAuth: []
      - {}
      responses:
        '200':
          description: No response body
  /api/v1/auth/login/:
    post:
      operationId: auth_login_create
      description: |-
        Custom login that returns JWT tokens.

        Why custom instead of simplejwt's built-in TokenObtainPairView:
        We want:
        - Custom response format (wrapped in status/data envelope)
        - Logging of successful/failed login attempts
        - Update last_login_at and last_login_ip
        - Return user data alongside tokens (saves a separate /me call)

        Why username=email in kwargs:
        Our User model uses email as USERNAME_FIELD, but authenticate()
        still expects the 'username' kwarg regardless of the field name.
      summary: Login with email and password
      tags:
      - Authentication
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/TokenObtainRequest'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/TokenObtainRequest'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/TokenObtainRequest'
        required: true
      security:
      - jwtAuth: []
      - BearerAuth: []
      - {}
      responses:
        '200':
          description: No response body
  /api/v1/auth/logout/:
    post:
      operationId: auth_logout_create
      description: |-
        Invalidate refresh token.

        Blacklists the refresh token so it cannot be used again.
        The access token remains valid until its 15-minute expiry.
        This is a deliberate trade-off — short-lived access tokens
        minimize the damage from not being able to instantly revoke them.
      summary: Logout and blacklist refresh token
      tags:
      - Authentication
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                refresh:
                  type: string
      security:
      - jwtAuth: []
      - BearerAuth: []
      responses:
        '200':
          description: No response body
