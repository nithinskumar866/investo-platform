      - b2b
      - b2c
      - b2b2c
      - marketplace
      - subscription
      - freemium
      - advertising
      - hardware
      - other
      type: string
      description: |-
        * `b2b` - B2B
        * `b2c` - B2C
        * `b2b2c` - B2B2C
        * `marketplace` - Marketplace
        * `subscription` - Subscription
        * `freemium` - Freemium
        * `advertising` - Advertising
        * `hardware` - Hardware
        * `other` - Other
    DocumentTypeEnum:
      enum:
