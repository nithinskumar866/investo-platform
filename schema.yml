        name: business_model
        schema:
          type: string
          enum:
          - advertising
          - b2b
          - b2b2c
          - b2c
          - freemium
          - hardware
          - marketplace
          - other
          - subscription
        description: |-
          * `b2b` - B2B
          * `b2c` - B2C
          * `b2b2c` - B2B2C
          * `marketplace` - Marketplace
          * `subscription` - Subscription
          * `freemium` - Freemium
          * `advertising` - Advertising
          * `hardware` - Hardware
          * `other` - Other
      - in: query
        name: created_after
        schema:
          type: string
          format: date-time
      - in: query
        name: created_before
        schema:
          type: string
          format: date-time
      - in: query
        name: industry
        schema:
          type: string
      - in: query
        name: is_verified
        schema:
          type: boolean
      - in: query
        name: location
        schema:
          type: string
      - in: query
        name: max_equity
        schema:
          type: number
      - in: query
        name: max_funding_goal
        schema:
          type: number
      - in: query
        name: max_team_size
        schema:
          type: integer
      - in: query
        name: max_valuation
        schema:
          type: number
      - in: query
        name: min_equity
        schema:
          type: number
      - in: query
        name: min_funding_goal
        schema:
          type: number
      - in: query
        name: min_team_size
        schema:
          type: integer
      - in: query
        name: min_valuation
        schema:
          type: number
      - name: ordering
        required: false
        in: query
        description: Which field to use when ordering the results.
        schema:
          type: string
      - name: page
        required: false
        in: query
        description: A page number within the paginated result set.
        schema:
          type: integer
      - name: per_page
        required: false
        in: query
        description: Number of results to return per page.
        schema:
          type: integer
      - name: search
        required: false
        in: query
        description: A search term.
        schema:
          type: string
      - in: query
        name: stage
        schema:
          type: string
      - in: query
        name: status
        schema:
          type: string
      tags:
      - Startups
      security:
