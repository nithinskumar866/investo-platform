    StatusEnum:
      enum:
      - draft
      - active
      - funded
      - closed
      type: string
      description: |-
        * `draft` - Draft
        * `active` - Active
        * `funded` - Funded
        * `closed` - Closed
    TokenObtainRequest:
      type: object
      description: |-
        Custom JWT token serializer that accepts email as username.

        Why custom:
        DRF simplejwt's default serializer expects a 'username' field.
        Our User model uses email as USERNAME_FIELD, but we want the
        API to be explicit about accepting 'email' not 'username'.
      properties:
        email:
          type: string
          format: email
          minLength: 1
        password:
          type: string
          writeOnly: true
          minLength: 1
      required:
      - email
      - password
    TokenRefresh:
      type: object
      properties:
        access:
          type: string
          readOnly: true
        refresh:
          type: string
      required:
      - access
      - refresh
    TokenRefreshRequest:
      type: object
      properties:
        refresh:
          type: string
          minLength: 1
      required:
      - refresh
