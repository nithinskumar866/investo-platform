        - password is write_only: never returned in responses
        - password uses PasswordInput-equivalent via style
        - role is required: every user must choose their role at signup
        - email is lowercased: prevents duplicate accounts with case variants
      properties:
        email:
          type: string
          format: email
          minLength: 1
          maxLength: 254
        password:
          type: string
          writeOnly: true
          minLength: 8
        confirm_password:
          type: string
          writeOnly: true
          minLength: 1
        first_name:
          type: string
          maxLength: 150
        last_name:
          type: string
          maxLength: 150
        role:
          $ref: '#/components/schemas/RoleEnum'
        phone:
          type: string
          maxLength: 20
      required:
      - confirm_password
