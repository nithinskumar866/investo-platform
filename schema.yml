          type: string
          format: email
          maxLength: 254
        linkedin_url:
          type: string
          format: uri
          maxLength: 200
        photo:
          type: string
          format: uri
          nullable: true
        bio:
          type: string
        is_founder:
          type: boolean
        order:
          type: integer
          maximum: 2147483647
          minimum: 0
