      - id
      - name
      - role
    StartupTeamMemberRequest:
      type: object
      properties:
        name:
          type: string
          minLength: 1
          maxLength: 255
        role:
          type: string
          minLength: 1
          maxLength: 255
        email:
          type: string
          format: email
          maxLength: 254
        linkedin_url:
          type: string
          format: uri
          maxLength: 200
        photo:
          type: string
          format: binary
          nullable: true
